<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="flex items-center justify-center h-screen bg-gray-100">
    <div class="text-center">
      <h1 class="font-bold text-2xl mb-4">Calendar</h1>

      <table
        class="border-collapse border border-gray-600 text-center w-80 bg-white"
      >
        <tr>
          <th colspan="7" class="border border-gray-600 p-2 bg-gray-200">
            August 2024
          </th>
        </tr>

        <tr class="bg-gray-100">
          <th class="border border-gray-600 p-2">Sun</th>
          <th class="border border-gray-600 p-2">Mon</th>
          <th class="border border-gray-600 p-2">Tue</th>
          <th class="border border-gray-600 p-2">Wed</th>
          <th class="border border-gray-600 p-2">Thu</th>
          <th class="border border-gray-600 p-2">Fri</th>
          <th class="border border-gray-600 p-2">Sat</th>
        </tr>

        <tr>
          <td class="border border-gray-600 h-10"></td>
          <td class="border border-gray-600"></td>
          <td class="border border-gray-600"></td>
          <td class="border border-gray-600"></td>
          <td class="border border-gray-600">1</td>
          <td class="border border-gray-600">2</td>
          <td class="border border-gray-600">3</td>
        </tr>

        <tr>
          <td class="border border-gray-600">4</td>
          <td class="border border-gray-600">5</td>
          <td class="border border-gray-600">6</td>
          <td class="border border-gray-600">7</td>
          <td class="border border-gray-600">8</td>
          <td class="border border-gray-600">9</td>
          <td class="border border-gray-600">10</td>
        </tr>

        <tr>
          <td class="border border-gray-600">11</td>
          <td class="border border-gray-600">12</td>
          <td class="border border-gray-600">13</td>
          <td class="border border-gray-600">14</td>
          <td class="border border-gray-600">15</td>
          <td class="border border-gray-600">16</td>
          <td class="border border-gray-600">17</td>
        </tr>

        <tr>
          <td class="border border-gray-600">18</td>
          <td class="border border-gray-600">19</td>
          <td class="border border-gray-600">20</td>
          <td class="border border-gray-600">21</td>
          <td class="border border-gray-600">22</td>
          <td class="border border-gray-600">23</td>
          <td class="border border-gray-600">24</td>
        </tr>

        <tr>
          <td class="border border-gray-600">25</td>
          <td class="border border-gray-600">26</td>
          <td class="border border-gray-600">27</td>
          <td class="border border-gray-600">28</td>
          <td class="border border-gray-600">29</td>
          <td class="border border-gray-600">30</td>
          <td class="border border-gray-600">31</td>
        </tr>
      </table>
    </div>
  </body>
</html>
