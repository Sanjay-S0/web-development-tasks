<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-black flex justify-center items-center w-full h-screen">
    <div class="w-full h-full bg-black">
      <input
        type="text"
        id="display"
        disabled
        class="w-full h-1/3 text-right text-6xl text-white bg-black pr-5"
      />

      <div
        class="grid grid-cols-4 text-white text-4xl h-1/2 gap-1 mt-6 md:mt-20"
      >
        <button
          onclick="clearDisplay()"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          AC
        </button>
        <button
          onclick="appendValue('/')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          ÷
        </button>
        <button
          onclick="appendValue('*')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          ×
        </button>
        <button
          onclick="deleteLast()"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          ⌫
        </button>

        <button
          onclick="appendValue('7')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          7
        </button>
        <button
          onclick="appendValue('8')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          8
        </button>
        <button
          onclick="appendValue('9')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          9
        </button>
        <button
          onclick="appendValue('-')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          −
        </button>

        <button
          onclick="appendValue('4')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          4
        </button>
        <button
          onclick="appendValue('5')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          5
        </button>
        <button
          onclick="appendValue('6')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          6
        </button>
        <button
          onclick="appendValue('+')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          +
        </button>

        <button
          onclick="appendValue('1')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          1
        </button>
        <button
          onclick="appendValue('2')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          2
        </button>
        <button
          onclick="appendValue('3')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          3
        </button>
        <button
          onclick="appendValue('%')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          %
        </button>

        <button
          onclick="appendValue('00')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          00
        </button>
        <button
          onclick="appendValue('0')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          0
        </button>
        <button
          onclick="appendValue('.')"
          class="py-5 hover:bg-gray-800 border-white border rounded-lg"
        >
          .
        </button>

        <button
          id="equal"
          onclick="calculate()"
          class="py-5 bg-orange-500 text-white hover:bg-orange-400 border-white border rounded-lg"
        >
          =
        </button>
      </div>
    </div>

    <script>
      const display = document.getElementById("display");

      function appendValue(value) {
        display.value += value;
      }

      function clearDisplay() {
        display.value = "";
      }

      function deleteLast() {
        display.value = display.value.slice(0, -1);
      }

      function calculate() {
        try {
          display.value = eval(display.value);
        } catch {
          display.value = "Error";
        }
      }
    </script>
  </body>
</html>
